<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Add New Product</h2>
    <div class="mb-3">
        <label>Product Name</label>
        <input type="text" id="pName" class="form-control">
    </div>
    <div class="mb-3">
        <label>Category</label>
        <select id="categoryDrop" class="form-select">
            <option>Loading categories...</option>
        </select>
    </div>
    <button onclick="saveProduct()" class="btn btn-primary">Save Product</button>

    <script>
        const API_URL = "https://localhost:5154/api"; // Check your https port in launchSettings.json

        // 1. Fetch categories and fill the dropdown automatically
        async function loadCategories() {
            const response = await fetch(`${API_URL}/Category`);
            const categories = await response.json();
            const drop = document.getElementById('categoryDrop');
            drop.innerHTML = categories.map(c => 
                `<option value="${c.id}">${c.name}</option>`
            ).join('');
        }

        async function saveProduct() {
            const product = {
                name: document.getElementById('pName').value,
                categoryId: document.getElementById('categoryDrop').value,
                price: 10 // hardcoded for test
            };

            const res = await fetch(`${API_URL}/Product`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });

            if(res.ok) alert("Product saved with long ID!");
            else alert("Error: " + await res.text());
        }

        loadCategories();
    </script>
</body>
</html>
